<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Student Portal</title>
    <!-- Bootstrap 5.3.2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100 py-4">
            <div class="col-md-6 col-lg-5">
                <div class="card form-card shadow">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center mb-4">Student Registration</h3>

                        <!-- Message Area -->
                        <div id="regMessage" class="alert d-none" role="alert"></div>

                        <!-- Registration Form -->
                        <form onsubmit="event.preventDefault(); registerUser();">
                            <div class="mb-3">
                                <label for="regName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="regName" placeholder="Enter your full name" required>
                            </div>

                            <div class="mb-3">
                                <label for="regEmail" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="regEmail" placeholder="Enter your email" required>
                            </div>

                            <div class="mb-3">
                                <label for="regPhone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="regPhone" placeholder="Enter 10-digit phone number" maxlength="10">
                            </div>

                            <div class="mb-3">
                                <label for="regPassword" class="form-label">Password</label>
                                <input type="password" class="form-control" id="regPassword" placeholder="Minimum 8 characters" required>
                            </div>

                            <div class="mb-3">
                                <label for="regConfirmPassword" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="regConfirmPassword" placeholder="Re-enter your password" required>
                            </div>

                            <div class="mb-3">
                                <label for="regCourse" class="form-label">Course</label>
                                <select class="form-select" id="regCourse">
                                    <option value="" selected disabled>-- Select Course --</option>
                                    <option value="BCA">BCA</option>
                                    <option value="BBA">BBA</option>
                                    <option value="B.Com">B.Com</option>
                                    <option value="B.Sc">B.Sc</option>
                                    <option value="MCA">MCA</option>
                                </select>
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-success">Register</button>
                            </div>
                        </form>

                        <p class="text-center mb-0">
                            Already have an account? <a href="index.html">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3.2 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>

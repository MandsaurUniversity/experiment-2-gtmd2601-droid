<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Student Portal</title>
    <!-- Bootstrap 5.3.2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Student Portal</a>
            <button class="btn btn-outline-light btn-sm" onclick="logoutUser()">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <!-- Welcome Message -->
                <h2 id="welcomeMessage" class="text-center mb-4">Welcome!</h2>

                <!-- User Details Card -->
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Your Profile</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-borderless mb-0">
                            <tbody>
                                <tr>
                                    <th scope="row" class="text-muted" style="width: 35%;">Name</th>
                                    <td id="dashName">—</td>
                                </tr>
                                <tr>
                                    <th scope="row" class="text-muted">Email</th>
                                    <td id="dashEmail">—</td>
                                </tr>
                                <tr>
                                    <th scope="row" class="text-muted">Phone</th>
                                    <td id="dashPhone">—</td>
                                </tr>
                                <tr>
                                    <th scope="row" class="text-muted">Course</th>
                                    <td id="dashCourse">—</td>
                                </tr>
                                <tr>
                                    <th scope="row" class="text-muted">Last Login</th>
                                    <td id="dashLoginTime">—</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer text-center">
                        <button class="btn btn-danger" onclick="logoutUser()">Logout</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3.2 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
    <!-- Load dashboard on page load -->
    <script>
        loadDashboard();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 08: Frames Layout</title>
</head>
<!-- ⚠️ WARNING: <frameset> is DEPRECATED in HTML5. This is taught as per syllabus only. -->
<frameset cols="20%,60%,20%">
    <frame src="nav.html" name="navigation">
    <frame src="main.html" name="content">
    <frame src="remarks.html" name="remarks">
    <noframes>
        <body>
            <p>Your browser does not support frames. Please use a modern browser.</p>
        </body>
    </noframes>
</frameset>
</html>
